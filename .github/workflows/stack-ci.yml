name: Stack CI

on:
  push:
    branches: [ main, develop ]
    paths:
    - '.github/workflows/stack-ci.yml'
    - 'stack.yaml'
    - 'stack.yaml.lock'
    - 'periodic-*/**'
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
    - '.github/workflows/stack-ci.yml'
    - 'stack.yaml'
    - 'stack.yaml.lock'
    - 'periodic-*/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true

      - name: Cache Stack dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock', 'stack.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Stack build
        run: stack --no-terminal build

      - name: Stack test
        run: stack --no-terminal test

      - name: Stack echo integration tests
        run: |
          set -euo pipefail

          cat > echo-pipe.sh <<'EOF'
          #!/usr/bin/env bash
          echo ready
          while read -r msgid arg; do
            echo "${arg}" >> pipe-events.log
            echo "${msgid} ${arg}"
          done
          EOF
          chmod +x echo-pipe.sh
          : > pipe-events.log

          stack exec periodicd > periodicd.log 2>&1 &
          SERVER_PID=$!
          WORKER_PID=""

          stop_worker() {
            if [ -n "$WORKER_PID" ]; then
              kill "$WORKER_PID" 2>/dev/null || true
              wait "$WORKER_PID" 2>/dev/null || true
              WORKER_PID=""
            fi
          }

          cleanup() {
            stop_worker
            kill "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in $(seq 1 20); do
            if stack exec periodic -- ping >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          stack exec periodic -- ping >/dev/null

          # Test 1: run action with periodic-run --data
          stack exec periodic-run -- --data echo-run-func echo > periodic-run.log 2>&1 &
          WORKER_PID=$!
          for i in $(seq 1 20); do
            if grep -F "Worker started." periodic-run.log >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          OUTPUT="$(stack exec periodic -- run echo-run-func echo)"
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -F "Result: echo"
          stop_worker

          # Test 2: submit action with periodic-run
          stack exec periodic-run -- echo-submit-func echo > periodic-run.log 2>&1 &
          WORKER_PID=$!
          for i in $(seq 1 20); do
            if grep -F "Worker started." periodic-run.log >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          stack exec periodic -- submit echo-submit-func echo-submit

          for i in $(seq 1 20); do
            if grep -Fx "echo-submit" periodic-run.log >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          grep -Fx "echo-submit" periodic-run.log
          stop_worker

          # Test 3: run + submit actions with periodic-run-pipe
          stack exec periodic-run-pipe -- echo-pipe-func ./echo-pipe.sh > periodic-run-pipe.log 2>&1 &
          WORKER_PID=$!

          for i in $(seq 1 20); do
            if grep -F "Pipe Worker started." periodic-run-pipe.log >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          OUTPUT="$(stack exec periodic -- run echo-pipe-func echo-pipe-run)"
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -F "Result: echo-pipe-run"

          stack exec periodic -- submit echo-pipe-func echo-pipe-submit

          for i in $(seq 1 20); do
            if grep -Fx "echo-pipe-submit" pipe-events.log >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          grep -Fx "echo-pipe-submit" pipe-events.log
