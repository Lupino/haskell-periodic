name: Stack CI

on:
  push:
    branches: [ main, develop ]
    paths:
    - '.github/workflows/stack-ci.yml'
    - 'scripts/ci/**'
    - 'stack.yaml'
    - 'stack.yaml.lock'
    - 'periodic-*/**'
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
    - '.github/workflows/stack-ci.yml'
    - 'scripts/ci/**'
    - 'stack.yaml'
    - 'stack.yaml.lock'
    - 'periodic-*/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: periodic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d periodic_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true

      - name: Cache Stack dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock', 'stack.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Stack build
        run: stack --no-terminal build

      - name: Stack test
        run: stack --no-terminal test

      - name: Stack echo integration tests
        env:
          PERIODIC_TEST_POSTGRES_URI: postgres://host='127.0.0.1' port=5432 dbname='periodic_test' user='postgres' password='postgres'
        run: bash ./scripts/ci/echo-integration-spec.sh
